<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TriFlow — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(120,120,120,0.3); border-radius: 99px; }

  @keyframes tfFadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes tfFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tfSlideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes tfSlideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-20px); } }
  @keyframes tfFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes tfPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }

  button:focus-visible, a:focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }
  button:focus:not(:focus-visible), a:focus:not(:focus-visible) { outline: none; }

  input::placeholder { color: rgba(150,150,150,0.6); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="tokens.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="onboarding-screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "step": 0,
  "mode": "dark",
  "viewMode": "single"
}/*EDITMODE-END*/;

const STEPS = [
  { id: "welcome",     comp: "ScreenWelcome",     showFrame: true,  showProgress: false },
  { id: "account",     comp: "ScreenAccount",     showFrame: true,  showProgress: true },
  { id: "name",        comp: "ScreenName",        showFrame: true,  showProgress: true },
  { id: "country",     comp: "ScreenCountry",     showFrame: true,  showProgress: true },
  { id: "goal",        comp: "ScreenGoal",        showFrame: true,  showProgress: true },
  { id: "body",        comp: "ScreenBody",        showFrame: true,  showProgress: true },
  { id: "restrictions",comp: "ScreenRestrictions",showFrame: true,  showProgress: true },
  { id: "training",    comp: "ScreenTraining",    showFrame: true,  showProgress: true },
  { id: "pantry",      comp: "ScreenPantry",      showFrame: true,  showProgress: true },
  { id: "generating",  comp: "ScreenGenerating",  showFrame: true,  showProgress: false },
  { id: "ready",       comp: "ScreenReady",       showFrame: true,  showProgress: false },
  { id: "home",        comp: "ScreenHome",        showFrame: true,  showProgress: false },
];

const INITIAL_STATE = {
  email: "", password: "",
  firstName: "Diego", lastName: "",
  country: "ES",
  goal: "bajar_peso",
  height: "175", weight: "78", targetWeight: "72",
  restrictions: ["lactosa"],
  trainingDays: 4, trainingType: "fuerza",
  pantry: ["huevos", "pollo", "arroz", "avena", "aguacate"],
};

function ProgressBar({ T, current, total }) {
  return (
    <div style={{
      display: "flex", gap: 4, padding: "8px 24px 0",
      background: T.bg, transition: "background .35s ease",
    }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          flex: 1, height: 3, borderRadius: 99,
          background: i <= current ? T.sage : T.border,
          transition: "background .4s ease",
        }}/>
      ))}
    </div>
  );
}

function App() {
  const [tw, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [state, setState] = React.useState(INITIAL_STATE);
  const [direction, setDirection] = React.useState("forward");
  const dark = tw.mode === "dark";
  const T = dark ? window.TRIFLOW_TOKENS.dark : window.TRIFLOW_TOKENS.light;
  const stepIdx = Math.min(Math.max(0, parseInt(tw.step) || 0), STEPS.length - 1);
  const current = STEPS[stepIdx];

  const goTo = (n) => {
    const next = Math.min(Math.max(0, n), STEPS.length - 1);
    setDirection(next > stepIdx ? "forward" : "back");
    setTweak("step", next);
  };
  const next = () => goTo(stepIdx + 1);
  const back = () => goTo(stepIdx - 1);

  React.useEffect(() => {
    document.body.style.background = dark ? "#0f1411" : "#EDE8DD";
    document.body.style.color = T.charcoal;
  }, [dark]);

  // Step counter (excluding splash screens)
  const dataSteps = STEPS.filter(s => s.showProgress);
  const dataIdx = dataSteps.findIndex(s => s.id === current.id);

  const ScreenComp = window[current.comp];

  if (tw.viewMode === "grid") {
    return <GridView T={T} dark={dark} state={state} setState={setState}
                     onSelect={i => { setTweak("viewMode", "single"); setTweak("step", i); }}/>;
  }

  return (
    <div style={{
      minHeight: "100vh", width: "100%",
      background: dark ? "#0f1411" : "#EDE8DD",
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: "24px 16px",
      transition: "background .4s ease",
    }}>
      {/* Top bar */}
      <div style={{
        width: "100%", maxWidth: 460,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        marginBottom: 18,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <window.AnimatedLogo T={T} size={28}/>
          <span style={{
            fontFamily: window.TRIFLOW_FONTS.display, fontSize: 17, fontWeight: 500,
            color: dark ? "#EAE6DE" : "#2C2C2C", letterSpacing: "-0.02em",
          }}>TriFlow</span>
          <span style={{
            padding: "3px 8px", borderRadius: 99,
            background: dark ? "#ffffff14" : "#0000000c",
            color: dark ? "#EAE6DE99" : "#2C2C2C99",
            fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase",
            fontFamily: window.TRIFLOW_FONTS.body,
          }}>Onboarding</span>
        </div>
        {dataIdx >= 0 && (
          <div style={{
            fontSize: 12, color: dark ? "#EAE6DE99" : "#2C2C2C99",
            fontFamily: window.TRIFLOW_FONTS.body, fontWeight: 500,
          }}>
            {dataIdx + 1} / {dataSteps.length}
          </div>
        )}
      </div>

      {/* iPhone frame */}
      <div style={{ position: "relative" }}>
        <window.IOSDevice width={392} height={820} dark={dark}>
          <div style={{
            width: "100%", height: "100%",
            display: "flex", flexDirection: "column",
            background: T.bg,
          }}>
            {current.showProgress && <ProgressBar T={T} current={dataIdx} total={dataSteps.length}/>}
            <div key={current.id} style={{
              flex: 1, minHeight: 0, position: "relative",
              animation: `${direction === "forward" ? "tfSlideIn" : "tfFadeIn"} .35s ease both`,
            }}>
              <ScreenComp T={T} dark={dark} state={state} setState={setState} next={next} back={back}/>
            </div>
          </div>
        </window.IOSDevice>

        {/* Side back button */}
        {stepIdx > 0 && (
          <button onClick={back} aria-label="Anterior" style={{
            position: "absolute", left: -64, top: "50%", transform: "translateY(-50%)",
            width: 48, height: 48, borderRadius: 99,
            background: dark ? "#ffffff10" : "#0000000a",
            border: `1px solid ${dark ? "#ffffff20" : "#00000010"}`,
            color: dark ? "#EAE6DE" : "#2C2C2C",
            cursor: "pointer", fontSize: 20,
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all .2s ease",
            backdropFilter: "blur(8px)",
          }}>‹</button>
        )}
        {stepIdx < STEPS.length - 1 && (
          <button onClick={next} aria-label="Siguiente" style={{
            position: "absolute", right: -64, top: "50%", transform: "translateY(-50%)",
            width: 48, height: 48, borderRadius: 99,
            background: dark ? "#ffffff10" : "#0000000a",
            border: `1px solid ${dark ? "#ffffff20" : "#00000010"}`,
            color: dark ? "#EAE6DE" : "#2C2C2C",
            cursor: "pointer", fontSize: 20,
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all .2s ease",
            backdropFilter: "blur(8px)",
          }}>›</button>
        )}
      </div>

      {/* Step dots / labels */}
      <div style={{
        marginTop: 22, display: "flex", flexWrap: "wrap", gap: 6,
        maxWidth: 460, justifyContent: "center",
      }}>
        {STEPS.map((s, i) => (
          <button key={s.id} onClick={() => goTo(i)} style={{
            padding: "6px 11px", borderRadius: 99,
            background: i === stepIdx
              ? T.sage
              : (dark ? "#ffffff10" : "#0000000a"),
            color: i === stepIdx ? "#fff" : (dark ? "#EAE6DE99" : "#2C2C2C99"),
            border: "none",
            fontSize: 11, fontWeight: 500,
            fontFamily: window.TRIFLOW_FONTS.body, cursor: "pointer",
            transition: "all .2s ease",
            textTransform: "capitalize",
          }}>{s.id}</button>
        ))}
      </div>

      {/* View grid button */}
      <button onClick={() => setTweak("viewMode", "grid")} style={{
        marginTop: 14, padding: "8px 16px", borderRadius: 99,
        background: "transparent",
        border: `1px solid ${dark ? "#ffffff20" : "#00000018"}`,
        color: dark ? "#EAE6DE99" : "#2C2C2C99",
        fontSize: 12, fontWeight: 500,
        fontFamily: window.TRIFLOW_FONTS.body, cursor: "pointer",
        display: "flex", alignItems: "center", gap: 6,
      }}>
        <svg width="12" height="12" viewBox="0 0 12 12">
          <rect x="0.5" y="0.5" width="4.5" height="4.5" rx="1" fill="none" stroke="currentColor"/>
          <rect x="7" y="0.5" width="4.5" height="4.5" rx="1" fill="none" stroke="currentColor"/>
          <rect x="0.5" y="7" width="4.5" height="4.5" rx="1" fill="none" stroke="currentColor"/>
          <rect x="7" y="7" width="4.5" height="4.5" rx="1" fill="none" stroke="currentColor"/>
        </svg>
        Ver todas las pantallas
      </button>

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Apariencia">
          <window.TweakRadio label="Modo" value={tw.mode} options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]} onChange={v => setTweak("mode", v)}/>
          <window.TweakRadio label="Vista" value={tw.viewMode} options={[{value:"single",label:"Phone"},{value:"grid",label:"Grid"}]} onChange={v => setTweak("viewMode", v)}/>
        </window.TweakSection>
        <window.TweakSection title="Navegación">
          <window.TweakSelect label="Ir al paso" value={String(tw.step)}
            options={STEPS.map((s, i) => ({ value: String(i), label: `${i}. ${s.id}` }))}
            onChange={v => goTo(parseInt(v))}/>
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

function GridView({ T, dark, state, setState, onSelect }) {
  return (
    <div style={{
      minHeight: "100vh", width: "100%",
      background: dark ? "#0f1411" : "#EDE8DD",
      padding: "32px 24px",
      transition: "background .4s ease",
    }}>
      <div style={{ maxWidth: 1280, margin: "0 auto" }}>
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "center",
          marginBottom: 28,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <window.AnimatedLogo T={T} size={32}/>
            <div>
              <div style={{ fontFamily: window.TRIFLOW_FONTS.display, fontSize: 22, fontWeight: 500, color: dark ? "#EAE6DE" : "#2C2C2C", letterSpacing: "-0.02em" }}>TriFlow Onboarding</div>
              <div style={{ fontSize: 12, color: dark ? "#EAE6DE99" : "#2C2C2C99", fontFamily: window.TRIFLOW_FONTS.body }}>{STEPS.length} pantallas · de welcome a home</div>
            </div>
          </div>
          <button onClick={() => onSelect(0)} style={{
            padding: "10px 18px", borderRadius: 99,
            background: T.sageD, color: "#fff", border: "none",
            fontSize: 13, fontWeight: 600,
            fontFamily: window.TRIFLOW_FONTS.body, cursor: "pointer",
          }}>Ver flujo paso a paso →</button>
        </div>

        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))",
          gap: 20,
        }}>
          {STEPS.map((s, i) => {
            const ScreenComp = window[s.comp];
            return (
              <button key={s.id} onClick={() => onSelect(i)} style={{
                background: "transparent", border: "none", cursor: "pointer",
                padding: 0, textAlign: "left",
                display: "flex", flexDirection: "column", gap: 10,
              }}>
                <div style={{
                  position: "relative",
                  borderRadius: 28, overflow: "hidden",
                  background: T.bg,
                  border: `1px solid ${dark ? "#ffffff15" : "#00000010"}`,
                  aspectRatio: "9/19",
                  transition: "transform .25s ease, box-shadow .25s ease",
                }}
                onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "0 14px 40px rgba(0,0,0,0.18)"; }}
                onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
                >
                  <div style={{
                    position: "absolute", inset: 0,
                    transform: "scale(0.55)", transformOrigin: "top left",
                    width: `${100 / 0.55}%`, height: `${100 / 0.55}%`,
                    pointerEvents: "none",
                  }}>
                    <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", background: T.bg }}>
                      {s.showProgress && <ProgressBar T={T} current={STEPS.filter(x=>x.showProgress).findIndex(x=>x.id===s.id)} total={STEPS.filter(x=>x.showProgress).length}/>}
                      <div style={{ flex: 1, minHeight: 0 }}>
                        <ScreenComp T={T} dark={dark} state={state} setState={setState} next={()=>{}} back={()=>{}}/>
                      </div>
                    </div>
                  </div>
                </div>
                <div style={{ paddingLeft: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{
                      width: 22, height: 22, borderRadius: 99,
                      background: T.sage + "22", color: T.sage,
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      fontSize: 11, fontWeight: 700,
                      fontFamily: window.TRIFLOW_FONTS.body,
                    }}>{i}</span>
                    <span style={{
                      fontSize: 14, fontWeight: 600,
                      color: dark ? "#EAE6DE" : "#2C2C2C",
                      fontFamily: window.TRIFLOW_FONTS.body,
                      textTransform: "capitalize",
                    }}>{s.id}</span>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Apariencia">
          <window.TweakRadio label="Modo" value={dark ? "dark" : "light"} options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]} onChange={v => {
            window.parent.postMessage({type:"__edit_mode_set_keys", edits: { mode: v }}, "*");
          }}/>
          <window.TweakRadio label="Vista" value="grid" options={[{value:"single",label:"Phone"},{value:"grid",label:"Grid"}]} onChange={v => {
            window.parent.postMessage({type:"__edit_mode_set_keys", edits: { viewMode: v }}, "*");
          }}/>
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
